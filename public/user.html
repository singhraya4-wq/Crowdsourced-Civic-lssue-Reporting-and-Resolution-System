<!DOCTYPE html>
<html>
<head>
<title>User Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Roboto';
    background:#202124;
    color:#e8eaed;
    text-align:center;
}

header {
    padding:20px;
    border-bottom:1px solid #3c4043;
    font-size:22px;
}

.container {
    margin-top:40px;
}

input {
    padding:12px;
    margin:10px;
    border-radius:8px;
    border:1px solid #5f6368;
    background:#202124;
    color:white;
}

input:focus {
    border-color:#4285F4;
    box-shadow:0 0 8px #4285F4;
}

button {
    padding:10px 20px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    background: linear-gradient(270deg,#4285F4,#EA4335,#FBBC05,#34A853);
    background-size:800% 800%;
    animation:gradient 8s infinite;
}

.status {
    margin-top:20px;
    font-size:14px;
}

@keyframes gradient {
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}
</style>
</head>

<body>

<header>🚧 Civic System</header>

<div class="container">
<h2>Report Issue</h2>

<input id="title" placeholder="Issue"><br>
<input id="location" placeholder="Location"><br>

<button onclick="report()">Submit</button>

<div class="status" id="status"></div>
</div>

<script>
async function report(){
    await fetch("/api/report",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            title:document.getElementById("title").value,
            location:document.getElementById("location").value
        })
    });

    document.getElementById("status").innerHTML=`
    🔵 Submitted <br>
    🟡 Acknowledged Soon <br>
    🟢 Resolution in Progress
    `;
}
</script>

</body>
</html>
