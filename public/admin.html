<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Roboto';
    background:#202124;
    color:#e8eaed;
}

header {
    padding:20px;
    text-align:center;
    border-bottom:1px solid #3c4043;
}

.container {
    width:90%;
    margin:auto;
    margin-top:30px;
}

.card {
    background:#303134;
    padding:15px;
    margin:10px;
    border-radius:12px;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
    box-shadow:0 0 15px rgba(66,133,244,0.3);
}

button {
    margin-top:8px;
    padding:6px 10px;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
    background: linear-gradient(270deg,#4285F4,#EA4335,#FBBC05,#34A853);
    background-size:800% 800%;
    animation:gradient 8s infinite;
}

@keyframes gradient {
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}
</style>
</head>

<body>

<header>🛠️ Admin Dashboard</header>

<div class="container" id="list"></div>

<script>
async function update(id,status){
    await fetch("/api/update",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id,status})
    });
    load();
}

async function load(){
    const res=await fetch("/api/issues");
    const data=await res.json();

    const list=document.getElementById("list");
    list.innerHTML="";

    data.forEach(i=>{
        const div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
        <b>${i.title}</b><br>
        ${i.location}<br>
        Status: ${i.status}<br>

        <button onclick="update(${i.id},'Acknowledged')">Acknowledge</button>
        <button onclick="update(${i.id},'Resolved')">Resolve</button>
        `;

        list.appendChild(div);
    });
}

load();
</script>

</body>
</html>
